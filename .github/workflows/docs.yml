name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare docs site
        run: |
          mkdir -p _site/css
          # Copy docs pages
          cp -r docs/src/pages/* _site/
          cp -r docs/src/css/* _site/css/
          cp -r docs/src/js _site/js
          # Copy token CSS for docs to reference
          mkdir -p _site/packages/tokens/css
          cp packages/tokens/css/*.css _site/packages/tokens/css/
          # Copy component CSS for component doc pages
          mkdir -p _site/packages/strand-ui/src/components/Button
          cp packages/strand-ui/src/components/Button/Button.css _site/packages/strand-ui/src/components/Button/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
