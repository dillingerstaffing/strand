name: Auto Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version changes
        id: check
        run: |
          CHANGED=false
          for pkg in packages/tokens/package.json packages/strand-ui/package.json packages/cli/package.json; do
            if git diff HEAD~1 HEAD -- "$pkg" | grep -q '"version"'; then
              CHANGED=true
              break
            fi
          done
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" = "true" ]; then
            # Use the highest version across all packages as the tag
            VERSION=$(node -p "
              const fs = require('fs');
              const versions = ['packages/tokens','packages/strand-ui','packages/cli']
                .map(d => JSON.parse(fs.readFileSync(d+'/package.json')).version);
              versions.sort((a,b) => b.localeCompare(a, undefined, {numeric:true}));
              versions[0];
            ")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Version changed: v$VERSION"
          else
            echo "No version changes detected"
          fi

      - name: Create release
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --target main
        env:
          GH_TOKEN: ${{ github.token }}
