name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Publish changed packages
        run: |
          publish_if_new() {
            local pkg_dir="$1" pkg_name="$2"
            local LOCAL=$(node -p "require('./${pkg_dir}/package.json').version")
            local REMOTE=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")
            if [ "$LOCAL" != "$REMOTE" ]; then
              pnpm --filter "$pkg_name" publish --no-git-checks --access public
              echo "Published ${pkg_name}@${LOCAL}"
            else
              echo "Skipped ${pkg_name}@${LOCAL} (already published)"
            fi
          }
          publish_if_new packages/tokens @dillingerstaffing/strand
          publish_if_new packages/strand-ui @dillingerstaffing/strand-ui
          publish_if_new packages/cli strand-ui
