name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm --filter @dillingerstaffing/strand publish --no-git-checks --access public
      - run: pnpm --filter @dillingerstaffing/strand-ui publish --no-git-checks --access public
      - run: pnpm --filter @dillingerstaffing/strand-cli publish --no-git-checks --access public
