name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # No registry-url on setup-node (that creates .npmrc expecting NODE_AUTH_TOKEN).
      # OIDC trusted publishing handles auth via --provenance flag.
      - run: npm config set registry https://registry.npmjs.org/

      - name: Publish @dillingerstaffing/strand
        working-directory: packages/tokens
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dillingerstaffing/strand version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            npm publish --access public --provenance
          else
            echo "Skipped @dillingerstaffing/strand@$LOCAL (already published)"
          fi

      - name: Publish @dillingerstaffing/strand-ui
        run: |
          LOCAL=$(node -p "require('./packages/strand-ui/package.json').version")
          REMOTE=$(npm view @dillingerstaffing/strand-ui version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm --filter @dillingerstaffing/strand-ui publish --no-git-checks --access public --provenance
          else
            echo "Skipped @dillingerstaffing/strand-ui@$LOCAL (already published)"
          fi

      - name: Publish strand-ui (CLI)
        working-directory: packages/cli
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view strand-ui version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            npm publish --access public --provenance
          else
            echo "Skipped strand-ui@$LOCAL (already published)"
          fi

      - name: Create release if versions changed
        run: |
          CHANGED=false
          for pkg in packages/tokens/package.json packages/strand-ui/package.json packages/cli/package.json; do
            if git diff HEAD~1 HEAD -- "$pkg" | grep -q '"version"'; then
              CHANGED=true
              break
            fi
          done
          if [ "$CHANGED" = "true" ]; then
            VERSION=$(node -p "
              const fs = require('fs');
              const versions = ['packages/tokens','packages/strand-ui','packages/cli']
                .map(d => JSON.parse(fs.readFileSync(d+'/package.json')).version);
              versions.sort((a,b) => b.localeCompare(a, undefined, {numeric:true}));
              versions[0];
            ")
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes --target main
            echo "Created release v${VERSION}"
          else
            echo "No version changes, skipping release"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
