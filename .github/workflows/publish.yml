name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Publish changed packages
        run: |
          publish_if_new() {
            local pkg_dir="$1" pkg_name="$2"
            local LOCAL=$(node -p "require('./${pkg_dir}/package.json').version")
            local REMOTE=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")
            if [ "$LOCAL" != "$REMOTE" ]; then
              cd "$pkg_dir" && npm publish --access public --provenance && cd -
              echo "Published ${pkg_name}@${LOCAL}"
            else
              echo "Skipped ${pkg_name}@${LOCAL} (already published)"
            fi
          }
          publish_if_new packages/tokens @dillingerstaffing/strand
          publish_if_new packages/strand-ui @dillingerstaffing/strand-ui
          publish_if_new packages/cli strand-ui

      - name: Create release if versions changed
        run: |
          CHANGED=false
          for pkg in packages/tokens/package.json packages/strand-ui/package.json packages/cli/package.json; do
            if git diff HEAD~1 HEAD -- "$pkg" | grep -q '"version"'; then
              CHANGED=true
              break
            fi
          done
          if [ "$CHANGED" = "true" ]; then
            VERSION=$(node -p "
              const fs = require('fs');
              const versions = ['packages/tokens','packages/strand-ui','packages/cli']
                .map(d => JSON.parse(fs.readFileSync(d+'/package.json')).version);
              versions.sort((a,b) => b.localeCompare(a, undefined, {numeric:true}));
              versions[0];
            ")
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes --target main
            echo "Created release v${VERSION}"
          else
            echo "No version changes, skipping release"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
