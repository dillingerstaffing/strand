name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Publish each package only if its version is not already on npm
      - name: Publish @dillingerstaffing/strand
        run: |
          LOCAL=$(node -p "require('./packages/tokens/package.json').version")
          REMOTE=$(npm view @dillingerstaffing/strand version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm --filter @dillingerstaffing/strand publish --no-git-checks --access public
            echo "Published @dillingerstaffing/strand@$LOCAL"
          else
            echo "Skipped @dillingerstaffing/strand@$LOCAL (already published)"
          fi

      - name: Publish @dillingerstaffing/strand-ui
        run: |
          LOCAL=$(node -p "require('./packages/strand-ui/package.json').version")
          REMOTE=$(npm view @dillingerstaffing/strand-ui version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm --filter @dillingerstaffing/strand-ui publish --no-git-checks --access public
            echo "Published @dillingerstaffing/strand-ui@$LOCAL"
          else
            echo "Skipped @dillingerstaffing/strand-ui@$LOCAL (already published)"
          fi

      - name: Publish @dillingerstaffing/strand-cli
        run: |
          LOCAL=$(node -p "require('./packages/cli/package.json').version")
          REMOTE=$(npm view @dillingerstaffing/strand-cli version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm --filter @dillingerstaffing/strand-cli publish --no-git-checks --access public
            echo "Published @dillingerstaffing/strand-cli@$LOCAL"
          else
            echo "Skipped @dillingerstaffing/strand-cli@$LOCAL (already published)"
          fi

      - name: Publish unscoped strand-ui CLI
        run: |
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          REMOTE=$(npm view strand-ui version 2>/dev/null || echo "0.0.0")
          if [ "$CLI_VERSION" != "$REMOTE" ]; then
            mkdir -p /tmp/strand-ui-publish
            cp -r packages/cli/dist /tmp/strand-ui-publish/dist
            chmod +x /tmp/strand-ui-publish/dist/index.js
            cat > /tmp/strand-ui-publish/package.json << EOF
          {
            "name": "strand-ui",
            "version": "${CLI_VERSION}",
            "description": "CLI for the Strand design language. Add components, tokens, and base styles to your project.",
            "author": "Dillinger Staffing <engineering@dillingerstaffing.com> (https://dillingerstaffing.com)",
            "license": "MIT",
            "keywords": ["design-system", "cli", "strand", "ui-components"],
            "homepage": "https://dillingerstaffing.com/labs/strand",
            "repository": { "type": "git", "url": "https://github.com/dillingerstaffing/strand" },
            "type": "module",
            "bin": { "strand": "./dist/index.js" },
            "files": ["dist/"]
          }
          EOF
            cd /tmp/strand-ui-publish && npm publish --access public
            echo "Published strand-ui@$CLI_VERSION"
          else
            echo "Skipped strand-ui@$CLI_VERSION (already published)"
          fi
