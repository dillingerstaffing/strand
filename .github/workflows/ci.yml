name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt every javascript action into Node 24 ahead of the June 2 2026
# forced migration. Without this, GitHub decorates every run with a
# yellow deprecation banner that reads like a failure even when the
# job is green.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: Cross-consumer parity check
        run: pnpm test:parity
