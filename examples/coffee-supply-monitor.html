<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Monitor — Built with Strand</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Strand Design Language (https://github.com/dillingerstaffing/strand) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dillingerstaffing/strand@0.9/css/tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dillingerstaffing/strand@0.9/css/reset.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dillingerstaffing/strand@0.9/css/base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dillingerstaffing/strand-ui@0.9/dist/css/strand-ui.css">

<style>
/* ════════════════════════════════════════════════
   Supply Monitor — Strand component showcase
   Layout only. All visual styling from Strand atoms
   and composition molecules.
   https://dillingerstaffing.com/labs/strand
   ════════════════════════════════════════════════ */

/* ── Page layout (not molecule territory) ── */

.monitor-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--strand-nav-height);
  padding-inline: clamp(1.5rem, 5vw, 3rem);
  background: var(--strand-surface-elevated);
  border-bottom: 1px solid var(--strand-gray-200);
}

.monitor {
  max-width: var(--strand-content-default);
  margin-inline: auto;
  padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 5vw, 3rem);
  display: flex;
  flex-direction: column;
  gap: var(--strand-space-6);
}

/* ── Primary readout: the one number that matters (Principle 2) ── */

.monitor-primary {
  text-align: center;
  padding-block: var(--strand-space-6);
}

.monitor-primary .strand-data-readout__value {
  font-size: clamp(4.5rem, 10vw, 7rem);
}

.monitor-gauge {
  max-width: var(--strand-space-40);
  margin: var(--strand-space-4) auto 0;
}

/* ── Context row layout ── */

.monitor-context {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: var(--strand-space-6);
  align-items: stretch;
}

@media (max-width: 640px) {
  .monitor-context { grid-template-columns: 1fr; }
}

/* ── Forecast viewport header ── */

.monitor-forecast { overflow: hidden; }

.monitor-forecast-header {
  padding: var(--strand-space-3) var(--strand-space-5);
  border-bottom: 1px solid var(--strand-gray-200);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ── Semantic overrides (earned color) ── */

.monitor-nav-status { color: var(--strand-teal-vital); }
.monitor-order-value { color: var(--strand-blue-primary); }
.monitor-forecast-blend { color: var(--strand-gray-400); }
.monitor-action { align-self: center; }

/* ── Reduced motion ── */

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<nav class="monitor-nav">
  <span class="strand-overline" style="font-size: var(--strand-text-sm); font-weight: var(--strand-weight-semibold); color: var(--strand-blue-midnight)">Supply Monitor</span>
  <span class="strand-overline monitor-nav-status">● Tracking</span>
</nav>

<main class="monitor">

  <!-- Primary readout -->
  <section class="monitor-primary">
    <div class="strand-data-readout strand-data-readout--lg">
      <span class="strand-data-readout__label">Remaining</span>
      <span class="strand-data-readout__value">284g</span>
    </div>
    <div class="strand-progress strand-progress--bar strand-progress--sm monitor-gauge"
         role="progressbar" aria-valuemin="0" aria-valuemax="500" aria-valuenow="284">
      <div class="strand-progress__fill" style="width: 57%"></div>
    </div>
  </section>

  <!-- Secondary readouts (centered-group derivation) -->
  <section class="strand-metric-row">
    <div class="strand-data-readout strand-data-readout--sm">
      <span class="strand-data-readout__label">Daily</span>
      <span class="strand-data-readout__value">36g</span>
    </div>
    <div class="strand-data-readout strand-data-readout--sm">
      <span class="strand-data-readout__label">Days Left</span>
      <span class="strand-data-readout__value">7.9</span>
    </div>
    <div class="strand-data-readout strand-data-readout--sm">
      <span class="strand-data-readout__label">Order By</span>
      <span class="strand-data-readout__value monitor-order-value">Apr 9</span>
    </div>
  </section>

  <!-- Forecast viewport (column-array derivation) -->
  <div class="strand-card strand-card--elevated strand-card--pad-none monitor-forecast">
    <header class="monitor-forecast-header">
      <span class="strand-overline">7-Day Depletion</span>
      <span class="strand-overline monitor-forecast-blend">Ethiopian Yirgacheffe</span>
    </header>
    <div class="strand-instrument-viewport strand-instrument-viewport--grid">
      <div class="strand-bar-chart">
        <div class="strand-bar-chart__col">
          <span class="strand-bar-chart__amount">284</span>
          <div class="strand-bar-chart__bar" style="height: 100%"></div>
          <span class="strand-bar-chart__label">Today</span>
        </div>
        <div class="strand-bar-chart__col">
          <span class="strand-bar-chart__amount">248</span>
          <div class="strand-bar-chart__bar" style="height: 87%"></div>
          <span class="strand-bar-chart__label">Fri</span>
        </div>
        <div class="strand-bar-chart__col">
          <span class="strand-bar-chart__amount">212</span>
          <div class="strand-bar-chart__bar" style="height: 75%"></div>
          <span class="strand-bar-chart__label">Sat</span>
        </div>
        <div class="strand-bar-chart__col">
          <span class="strand-bar-chart__amount">176</span>
          <div class="strand-bar-chart__bar" style="height: 62%"></div>
          <span class="strand-bar-chart__label">Sun</span>
        </div>
        <div class="strand-bar-chart__col">
          <span class="strand-bar-chart__amount">140</span>
          <div class="strand-bar-chart__bar" style="height: 49%"></div>
          <span class="strand-bar-chart__label">Mon</span>
        </div>
        <div class="strand-bar-chart__col">
          <span class="strand-bar-chart__amount">104</span>
          <div class="strand-bar-chart__bar" style="height: 37%"></div>
          <span class="strand-bar-chart__label">Tue</span>
        </div>
        <div class="strand-bar-chart__col">
          <span class="strand-bar-chart__amount">68</span>
          <div class="strand-bar-chart__bar" style="height: 24%"></div>
          <span class="strand-bar-chart__label" style="color: var(--strand-blue-primary)">Wed ●</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Context (section-boundary + inline-pair + ranked-sequence derivations) -->
  <section class="monitor-context">
    <div class="strand-card strand-card--elevated strand-card--pad-md">
      <div class="strand-card-section">
        <span class="strand-overline">Today</span>
      </div>
      <div class="strand-log">
        <span class="strand-log__time">9:15</span>
        <span class="strand-log__status strand-log__status--complete">Brewed</span>
        <span class="strand-text-secondary">Pour over. 18g.</span>
      </div>
      <div class="strand-log">
        <span class="strand-log__time">6:30</span>
        <span class="strand-log__status strand-log__status--complete">Brewed</span>
        <span class="strand-text-secondary">Espresso. 18g.</span>
      </div>
    </div>

    <div class="strand-card strand-card--elevated strand-card--pad-md">
      <div class="strand-card-section">
        <span class="strand-overline">Supply</span>
      </div>
      <div class="strand-kv">
        <span class="strand-kv__label">Blend</span>
        <span class="strand-kv__value">Yirgacheffe</span>
      </div>
      <div class="strand-kv">
        <span class="strand-kv__label">Fresh</span>
        <span class="strand-kv__value strand-kv__value--status">Peak</span>
      </div>
    </div>

    <button class="strand-btn strand-btn--primary strand-btn--md monitor-action" type="button">
      <span class="strand-btn__content">Log Brew</span>
    </button>
  </section>

</main>
</body>
</html>
